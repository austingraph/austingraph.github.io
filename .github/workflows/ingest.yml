name: Ingest civic data

# Nightly ingestion of Austin zoning cases, permits, and council votes into the
# parcel knowledge graph, plus embedding of new documents. Also runnable on
# demand from the Actions tab (workflow_dispatch) for the first load.

on:
  schedule:
    - cron: "0 8 * * 0"   # 08:00 UTC Sundays ≈ 03:00 Austin (weekly; data is historical)
  workflow_dispatch:

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/ingest/requirements.txt

      - name: Ingest zoning cases
        working-directory: scripts/ingest
        run: python ingest_zoning_cases.py

      - name: Ingest permits
        working-directory: scripts/ingest
        run: python ingest_permits.py

      - name: Ingest council votes
        working-directory: scripts/ingest
        run: python ingest_votes.py

      - name: Embed new documents
        working-directory: scripts/ingest
        run: python embed_documents.py
